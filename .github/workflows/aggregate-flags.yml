# Copy to .github/workflows/aggregate-flags.yml in the live feed repo.
# Rebuilds flagged.json from reports/ on every new report and daily.
name: Aggregate phishing flags

on:
  push:
    paths:
      - "reports/**"
      - "aggregate.py"
  schedule:
    - cron: "17 3 * * *" # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild flagged.json
        run: python3 aggregate.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet flagged.json; then
            git config user.name "vev-feed-bot"
            git config user.email "bot@users.noreply.github.com"
            git add flagged.json
            git commit -m "chore: regenerate flagged.json"
            git push
          else
            echo "no change"
          fi
